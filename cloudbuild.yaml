# cloudbuild.yaml
steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor'

  # Step 3: Deploy Cloud Run Job with new image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run jobs update gtrends-ingestor \
          --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor:$COMMIT_SHA \
          --region=asia-southeast1 \
          --project=$PROJECT_ID \
          --set-secrets=/secrets/wif-credential-config.json=wif-credential-config:latest \
          --set-env-vars="^|^PROJECT_ID=$PROJECT_ID|GCS_BUCKET=gtrends-data-lake|GEO_TARGETS=TH,US,GB,JP,SG" \
          --service-account=gtrends-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --task-timeout=600 \
          --max-retries=3 \
          --memory=512Mi \
          --cpu=1

substitutions:
  _REGION: asia-southeast1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/gtrends-pipeline/ingestor:latest'