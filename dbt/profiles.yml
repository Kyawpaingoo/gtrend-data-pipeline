gtrends:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: oauth       # Uses Application Default Credentials (WIF)
      project: "{{ env_var('PROJECT_ID') }}"
      dataset: gtrends_staging
      location: US
      threads: 4
      timeout_seconds: 300
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('PROJECT_ID') }}"
      dataset: gtrends_staging_dev
      location: US
      threads: 2
      timeout_seconds: 300